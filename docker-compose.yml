name: fourok

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: fourok
      POSTGRES_USER: fourok
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-check}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fourok -d fourok"]
      interval: 5s
      timeout: 5s
      retries: 12

  observability:
    image: grafana/otel-lgtm:0.28.0
    restart: unless-stopped
    environment:
      ENABLE_LOGS_ALL: "true"
    ports:
      - "127.0.0.1:${FOUROK_GRAFANA_PORT:-3000}:3000"
      - "127.0.0.1:${FOUROK_LOKI_PORT:-3100}:3100"
      - "127.0.0.1:${FOUROK_TEMPO_PORT:-3200}:3200"
      - "127.0.0.1:${FOUROK_OTLP_GRPC_PORT:-4317}:4317"
      - "127.0.0.1:${FOUROK_OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - observability-data:/data
      - ./deploy/observability/grafana-dashboards.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/fourok-dashboards.yaml:ro
      - ./deploy/observability/fourok-local-runtime-logs.json:/otel-lgtm/fourok-local-runtime-logs.json:ro
      - ./deploy/observability/prometheus.yaml:/otel-lgtm/prometheus.yaml:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3000/api/health >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  promtail:
    image: grafana/promtail:3.5.3
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./deploy/observability/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    depends_on:
      observability:
        condition: service_healthy

  fourok-metrics-exporter:
    image: fourok-app:${FOUROK_IMAGE_TAG:-local-check}
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python"]
    command:
      [
        "-m",
        "fourok.runtime.metrics_exporter",
        "--host",
        "0.0.0.0",
        "--port",
        "9108",
      ]
    environment:
      FOUROK_DAGSTER_GRAPHQL_URL: http://dagster-webserver:3001/graphql
      FOUROK_DATABASE_URL: ${FOUROK_DATABASE_URL:-postgresql+psycopg://fourok:${POSTGRES_PASSWORD:-local-check}@postgres:5432/fourok}
      FOUROK_STATE_PATH: /app/.local/dagster/fourok-state.sqlite
    expose:
      - "9108"
    volumes:
      - fourok-local:/app/.local
    depends_on:
      observability:
        condition: service_healthy

  dagster-postgres:
    image: postgres:16.10-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dagster
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-local-check}
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster -d dagster"]
      interval: 5s
      timeout: 5s
      retries: 12

  dagster-code:
    image: fourok-dagster-code:${FOUROK_IMAGE_TAG:-local-check}
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/dagster.Dockerfile
      target: dagster-code
    environment:
      DAGSTER_CURRENT_IMAGE: fourok-dagster-code:${FOUROK_IMAGE_TAG:-local-check}
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-local-check}
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: dagster-postgres
      FOUROK_DATABASE_URL: ${FOUROK_DATABASE_URL:-postgresql+psycopg://fourok:${POSTGRES_PASSWORD:-local-check}@postgres:5432/fourok}
      FOUROK_PROJECT_ROOT: /app
      FOUROK_DOTENV_PATH: /workspace/fourok/.env
      FOUROK_RAW_LANDING_DIR: /app/.local/raw/singer
      FOUROK_STATE_PATH: /app/.local/dagster/fourok-state.sqlite
      FOUROK_EMBEDDING_PROVIDER: ${FOUROK_EMBEDDING_PROVIDER:-hash}
      FOUROK_OPENAI_EMBEDDING_MODEL: ${FOUROK_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      FOUROK_EMBEDDING_DIMENSIONS: ${FOUROK_EMBEDDING_DIMENSIONS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      TAP_SLACK_SELECTED_CHANNELS: ${TAP_SLACK_SELECTED_CHANNELS:-}
      TAP_SLACK_START_DATE: ${TAP_SLACK_START_DATE:-}
      LINEAR_API_KEY: ${LINEAR_API_KEY:-}
      LINEAR_GRAPHQL_URL: ${LINEAR_GRAPHQL_URL:-}
      LINEAR_LIMIT: ${LINEAR_LIMIT:-}
      TWENTY_API_KEY: ${TWENTY_API_KEY:-}
      TWENTY_BASE_URL: ${TWENTY_BASE_URL:-}
      TWENTY_LIMIT: ${TWENTY_LIMIT:-}
      GOOGLE_WORKSPACE_OAUTH_CLIENT_SECRET_JSON: ${GOOGLE_WORKSPACE_OAUTH_CLIENT_SECRET_JSON:-}
      GOOGLE_WORKSPACE_OAUTH_REFRESH_TOKEN: ${GOOGLE_WORKSPACE_OAUTH_REFRESH_TOKEN:-}
      GOOGLE_WORKSPACE_DRIVE_IDS: ${GOOGLE_WORKSPACE_DRIVE_IDS:-}
      FOUROK_OBSERVABILITY_ENABLED: ${FOUROK_OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fourok-dagster-code}
    depends_on:
      postgres:
        condition: service_healthy
      dagster-postgres:
        condition: service_healthy
    volumes:
      - fourok-local:/app/.local
      - ./:/workspace/fourok:ro
    healthcheck:
      test: ["CMD", "dagster", "api", "grpc-health-check", "-p", "4000"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  dagster-webserver:
    image: ${FOUROK_DAGSTER_RUNTIME_IMAGE:-docker.io/dagster/dagster-k8s:1.13.8@sha256:24661edd6c98705eba61823804afab65ecd4691bf74a697b7c0d0659df5ed301}
    restart: unless-stopped
    command:
      - sh
      - -lc
      - >
        mkdir -p /opt/dagster/dagster_home &&
        cp /tmp/fourok-dagster-home/dagster.yaml /tmp/fourok-dagster-home/workspace.yaml /opt/dagster/dagster_home/ &&
        exec dagster-webserver -h 0.0.0.0 -p 3001 -w /opt/dagster/dagster_home/workspace.yaml
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-local-check}
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: dagster-postgres
      FOUROK_OBSERVABILITY_ENABLED: ${FOUROK_OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fourok-dagster-webserver}
    ports:
      - "127.0.0.1:${FOUROK_DAGSTER_PORT:-3001}:3001"
    volumes:
      - dagster-local:/var/lib/dagster
      - ./deploy/dagster/dagster.yaml:/tmp/fourok-dagster-home/dagster.yaml:ro
      - ./deploy/dagster/workspace.yaml:/tmp/fourok-dagster-home/workspace.yaml:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://localhost:3001/server_info'', timeout=2).read()"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  dagster-daemon:
    image: ${FOUROK_DAGSTER_RUNTIME_IMAGE:-docker.io/dagster/dagster-k8s:1.13.8@sha256:24661edd6c98705eba61823804afab65ecd4691bf74a697b7c0d0659df5ed301}
    restart: unless-stopped
    command:
      - sh
      - -lc
      - >
        mkdir -p /opt/dagster/dagster_home &&
        cp /tmp/fourok-dagster-home/dagster.yaml /tmp/fourok-dagster-home/workspace.yaml /opt/dagster/dagster_home/ &&
        dagster schedule start -w /opt/dagster/dagster_home/workspace.yaml fourok_hourly_live_backfill_schedule &&
        exec dagster-daemon run -w /opt/dagster/dagster_home/workspace.yaml
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_POSTGRES_USER: dagster
      DAGSTER_POSTGRES_PASSWORD: ${DAGSTER_POSTGRES_PASSWORD:-local-check}
      DAGSTER_POSTGRES_DB: dagster
      DAGSTER_POSTGRES_HOST: dagster-postgres
      FOUROK_OBSERVABILITY_ENABLED: ${FOUROK_OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fourok-dagster-daemon}
    volumes:
      - dagster-local:/var/lib/dagster
      - ./deploy/dagster/dagster.yaml:/tmp/fourok-dagster-home/dagster.yaml:ro
      - ./deploy/dagster/workspace.yaml:/tmp/fourok-dagster-home/workspace.yaml:ro
    depends_on:
      dagster-postgres:
        condition: service_healthy
      dagster-code:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "dagster-daemon liveness-check"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  app:
    image: fourok-app:${FOUROK_IMAGE_TAG:-local-check}
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    environment:
      FOUROK_DATABASE_URL: ${FOUROK_DATABASE_URL:-postgresql+psycopg://fourok:${POSTGRES_PASSWORD:-local-check}@postgres:5432/fourok}
      FOUROK_DOTENV_PATH: /workspace/fourok/.env
      FOUROK_OBSERVABILITY_ENABLED: ${FOUROK_OBSERVABILITY_ENABLED:-false}
      FOUROK_EMBEDDING_PROVIDER: ${FOUROK_EMBEDDING_PROVIDER:-hash}
      FOUROK_OPENAI_EMBEDDING_MODEL: ${FOUROK_OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      FOUROK_EMBEDDING_DIMENSIONS: ${FOUROK_EMBEDDING_DIMENSIONS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fourok-app}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - fourok-local:/app/.local
      - fourok-data:/var/lib/fourok
      - ./:/workspace/fourok:ro
      - ${FOUROK_CONFIG_PATH:-./.local/fourok.toml}:/etc/fourok/fourok.toml:ro
    healthcheck:
      test: ["CMD", "/app/.venv/bin/fourok", "health", "--database-only"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 10s
    command: ["runtime-monitor", "--config", "/etc/fourok/fourok.toml", "--database-only"]

  mcp:
    image: fourok-app:${FOUROK_IMAGE_TAG:-local-check}
    restart: unless-stopped
    build:
      context: .
      dockerfile: deploy/docker/app.Dockerfile
    entrypoint: ["/app/.venv/bin/fourok-mcp"]
    command:
      [
        "--transport",
        "streamable-http",
        "--host",
        "0.0.0.0",
        "--port",
        "8010",
        "--mount-path",
        "/mcp",
      ]
    environment:
      FOUROK_DATABASE_URL: ${FOUROK_DATABASE_URL:-postgresql+psycopg://fourok:${POSTGRES_PASSWORD:-local-check}@postgres:5432/fourok}
      FOUROK_CONFIG_PATH: /etc/fourok/fourok.toml
      FOUROK_OBSERVABILITY_ENABLED: ${FOUROK_OBSERVABILITY_ENABLED:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://observability:4318}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-fourok-mcp}
    ports:
      - "127.0.0.1:${FOUROK_MCP_PORT:-8010}:8010"
    volumes:
      - fourok-local:/app/.local
      - fourok-data:/var/lib/fourok
      - ${FOUROK_CONFIG_PATH:-./.local/fourok.toml}:/etc/fourok/fourok.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python - <<'PY'\nimport socket\ns=socket.create_connection(('127.0.0.1', 8010), 2)\ns.close()\nPY",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

volumes:
  postgres-data:
  observability-data:
  dagster-postgres-data:
  dagster-local:
  fourok-local:
  fourok-data:
