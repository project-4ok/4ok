name: publish-runtime

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-runtime-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  publish:
    name: publish fourok runtime artifacts
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.manifest.outputs.app_image }}
      dagster_code_image: ${{ steps.manifest.outputs.dagster_code_image }}
      dagster_runtime_image: ${{ steps.manifest.outputs.dagster_runtime_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Run fast tests
        run: uv run pytest tests/retrieval/test_retrieve_cli.py tests/runtime/test_deploy_artifacts.py tests/retrieval/clients/test_client_assets.py tests/devtools/test_openclaw_skill_package.py -q

      - name: Build CLI wheel
        run: |
          set -euo pipefail
          uv build --wheel
          sha256sum dist/fourok-*.whl > dist/fourok.sha256

      - name: Build OpenClaw skill artifact
        run: |
          set -euo pipefail
          uv run fourok-dev validate-openclaw-skill
          uv run fourok-dev build-openclaw-skill
          sha256sum dist/openclaw-skill-fourok-retrieval.tar.gz > dist/openclaw-skill-fourok-retrieval.sha256

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up ORAS
        uses: oras-project/setup-oras@v1

      - name: Publish OpenClaw skill package
        shell: bash
        run: |
          set -euo pipefail
          package_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/openclaw-skill-fourok-retrieval"
          oras push "${package_ref}:sha-${GITHUB_SHA}" \
            --artifact-type application/vnd.fourok.openclaw.skill.v1+tar \
            --annotation org.opencontainers.image.title="fourok retrieval OpenClaw skill" \
            --annotation org.opencontainers.image.description="CLI-first OpenClaw skill package for fourok retrieval" \
            --annotation org.opencontainers.image.source="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --annotation org.opencontainers.image.revision="${GITHUB_SHA}" \
            dist/openclaw-skill-fourok-retrieval.tar.gz:application/gzip \
            dist/openclaw-skill-fourok-retrieval.sha256:text/plain
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            oras cp "${package_ref}:sha-${GITHUB_SHA}" "${package_ref}:${GITHUB_REF_NAME}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        id: app
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/app.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fourok-app:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=fourok-app
          cache-to: type=gha,mode=max,scope=fourok-app

      - name: Build and push Dagster code image
        id: dagster-code
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/dagster.Dockerfile
          target: dagster-code
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fourok-dagster-code:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=fourok-dagster-code
          cache-to: type=gha,mode=max,scope=fourok-dagster-code

      - name: Write runtime manifest
        id: manifest
        shell: bash
        run: |
          set -euo pipefail
          wheel="$(ls dist/fourok-*.whl | head -1)"
          wheel_sha="$(cut -d' ' -f1 dist/fourok.sha256)"
          app_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/fourok-app@${{ steps.app.outputs.digest }}"
          dagster_code_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/fourok-dagster-code@${{ steps.dagster-code.outputs.digest }}"
          dagster_runtime_image="docker.io/dagster/dagster-k8s:1.13.8@sha256:24661edd6c98705eba61823804afab65ecd4691bf74a697b7c0d0659df5ed301"
          openclaw_skill_package="ghcr.io/${GITHUB_REPOSITORY_OWNER}/openclaw-skill-fourok-retrieval:sha-${GITHUB_SHA}"
          echo "app_image=${app_image}" >> "$GITHUB_OUTPUT"
          echo "dagster_code_image=${dagster_code_image}" >> "$GITHUB_OUTPUT"
          echo "dagster_runtime_image=${dagster_runtime_image}" >> "$GITHUB_OUTPUT"
          python - <<PY > runtime-manifest.json
          import json
          data = {
              "git_sha": "${GITHUB_SHA}",
              "wheel": "${wheel}",
              "wheel_sha256": "${wheel_sha}",
              "app_image": "${app_image}",
              "dagster_code_image": "${dagster_code_image}",
              "dagster_runtime_image": "${dagster_runtime_image}",
              "openclaw_skill_package": "${openclaw_skill_package}",
              "workflow_run_url": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
          }
          print(json.dumps(data, indent=2, sort_keys=True))
          PY
          cat runtime-manifest.json

      - name: Upload runtime manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: fourok-runtime-manifest-${{ github.sha }}
          path: |
            runtime-manifest.json
            dist/fourok-*.whl
            dist/fourok.sha256
            dist/openclaw-skill-fourok-retrieval.tar.gz
            dist/openclaw-skill-fourok-retrieval.sha256

      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            runtime-manifest.json
            dist/fourok-*.whl
            dist/fourok.sha256
            dist/openclaw-skill-fourok-retrieval.tar.gz
            dist/openclaw-skill-fourok-retrieval.sha256
