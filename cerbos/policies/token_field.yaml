apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: v1
  resource: token_field
  rules:
    - actions:
        - reveal
      effect: EFFECT_ALLOW
      roles:
        - operator
      condition:
        match:
          expr: request.resource.attr.token_type == "iban" && request.principal.attr.purpose == "payment_processing"
